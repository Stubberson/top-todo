<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do</title>
</head>
<body>
    <div class="sidebar">
        <div class="priority-classes">
            <button id="button-today-all">Today</button>
            <button id="button-important-all">Important</button>
            <button id="button-someday-all">Someday</button>
        </div>
        <ul class="projects-list"></ul>
    </div>
    <div class="content-container">
    </div>
    <div class="new-project-container">
        <button id="new-project">New Project</button>
    </div>

    <div class="footer">
        <dialog class="dialog-project">
            <button id="dialog-close">Close</button>
            <form>
                <h2>New Project</h2>
                <label for="dialog-project-header">Title</label>
                <input type="text" id="dialog-project-header" class="project-header" autocomplete="off" autofocus>

                <label for="dialog-project-description">Description</label>
                <input type="text" id="dialog-project-description" class="project-description" autocomplete="off">

                <label for="dialog-due-date">Due date</label>
                <input type="date" id="dialog-due-date" class="due-date">

                <span>Priority</span>
                <div class="priority-selection">
                    <button value="priority-none" class="priority-none" type="button"></button>
                    <button value="priority-high" class="priority-high" type="button"></button>
                    <button value="priority-medium" class="priority-medium" type="button"></button>
                    <button value="priority-low" class="priority-low" type="button"></button>
                </div>

                <button formmethod="dialog" id="dialog-submit" type="submit">Create project</button>
            </form>
        </dialog>
    </div>
</body>
</html>
