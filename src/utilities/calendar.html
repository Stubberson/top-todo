<!-- ORIGINAL: Obsidian plugin 'Calendar' by Liam Cain -->

<div id="calendar-container" class="container">
    <div class="nav">
        <h3 class="title"><span class="month">Apr</span> <span
                class="year">2026</span></h3>
        <div class="right-nav">
            <div class="arrow left" aria-label="Previous Month">
                <!-- LEFT ARROW SVG -->
                <svg>
                </svg>
            </div>
            <div class="reset-button">Today</div>
            <div class="arrow right" aria-label="Next Month">
                <!-- RIGHT ARROW SVG -->
                <svg>
                </svg>
            </div>
        </div>
    </div>

    <table class="calendar">
        <colgroup>
            <col>
            <col class="week-day">
            <col class="week-day">
            <col class="week-day">
            <col class="week-day">
            <col class="week-day">
            <col class="week-day weekend">
            <col class="week-day weekend">
        </colgroup>
        <thead>
            <tr>
                <th class="col-title">W</th>
                <th class="col-title">Mon</th>
                <th class="col-title">Tue</th>
                <th class="col-title">Wed</th>
                <th class="col-title">Thu</th>
                <th class="col-title">Fri</th>
                <th class="col-title">Sat</th>
                <th class="col-title">Sun</th>
            </tr>
        </thead>
        <tbody>
            <!-- THIS WOULD BE THE FIRST TABLE CONTENT ROW -->
            <!-- TO ACCOMMODATE EVERY DAY, 5 ROWS NEEDED -->
            <tr>
                <td>
                    <div class="week-num">14</div>
                </td>
                <td>
                    <div class="day adjacent-month" data-tags="">30</div>
                </td>
                <td>
                    <div class="day adjacent-month" data-tags="">31</div>
                </td>
                <td>
                    <div class="day" data-tags="">1</div>
                </td>
                <td>
                    <div class="day" data-tags="">2</div>
                </td>
                <td>
                    <div class="day" data-tags="">3</div>
                </td>
                <td>
                    <div class="day " data-tags="">4</div>
                </td>
                <td>
                    <div class="day " data-tags="">5</div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
