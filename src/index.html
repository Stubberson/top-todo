<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do</title>
</head>
<body>
    <div class="sidebar">
        <div class="priority-classes">
            <button id="button-today">Today</button>
            <button id="button-upcoming">Upcoming</button>
            <button id="button-someday">Someday</button>
        </div>
        <ul class="projects-list"></ul>
    </div>
    <div class="content-container">
    </div>
    <div class="new-project-container">
        <button id="new-project">New Project</button>
    </div>

    <div class="footer">
        <dialog class="dialog-project">
            <button id="dialog-close">Close</button>
            <form>
                <h2>New Project</h2>
                <label for="dialog-project-title">Title (min. 3 characters)</label>
                <!-- MAYBE THE "REQUIRED" IS UNNECESSARY, SINCE I MAKE IT EDITABLE? -->
                <input type="text" id="dialog-project-title" class="project-title" placeholder="Required" autocomplete="off" autofocus>

                <label for="dialog-project-description">Description</label>
                <input type="text" id="dialog-project-description" class="project-description" autocomplete="off">

                <label for="dialog-due-date">Due date</label>
                <input type="date" id="dialog-due-date" class="due-date">

                <label for="dialog-priority-selection">Priority</label>
                <select id="dialog-priority-selection" class="priority-selection">
                    <option value="">Select</option>
                    <option value="high">Urgent</option>
                    <option value="medium">Upcoming</option>
                    <option value="low">Someday</option>
                </select>

                <button formmethod="dialog" id="dialog-submit">Create project</button>
            </form>
        </dialog>
    </div>
</body>
</html>
