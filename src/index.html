<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do</title>
</head>
<body>
    <div class="sidebar">
        <div class="priority-classes">
            <button id="button-today">Today</button>
            <button id="button-upcoming">Upcoming</button>
            <button id="button-someday">Someday</button>
        </div>
        <ul class="projects-list"></ul>
        <button id="new-project">New Project</button>
        <dialog class="project-dialog">
            <button id="close-project-dialog">Close</button>
            <form>
                <h2>New Project</h2>
                <label for="title">Title</label>
                <input type="text" id="title" autofocus>

                <label for="description">Description</label>
                <input type="text" id="description">

                <label for="due-date-dialog">Due date</label>
                <input type="date" name="due-date" class="due-date" id="due-date-dialog">

                <label for="priority-selection-dialog">Priority</label>
                <select name="priority-selection" class="priority-selection" id="priority-selection-dialog">
                    <option value="">Select</option>
                    <option value="high">Urgent</option>
                    <option value="medium">Upcoming</option>
                    <option value="low">Someday</option>
                </select>

                <button formmethod="dialog" id="submit-project-dialog">Create project</button>
            </form>
        </dialog>
    </div>
    <div class="content-container">
    </div>
</body>
</html>
