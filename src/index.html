<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do</title>
</head>
<body>
    <div class="sidebar">
        <h2>Projects</h2>
        <ul class="projects-list">

        </ul>
        <button id="new-project">New Project</button>
        <dialog class="project-dialog">
            <button id="close-project-dialog">Close</button>
            <form>
                <h2>New Project</h2>
                <label for="title">Title</label>
                <input type="text" id="title" autofocus>

                <label for="description">Description</label>
                <input type="text" id="description">

                <label for="due-date">Due date</label>
                <input type="date" id="due-date">

                <label for="priority">Priority</label>
                <select id="priority">
                    <option value="">Select</option>
                    <option value="high">Urgent</option>
                    <option value="medium">Upcoming</option>
                    <option value="low">Someday</option>
                </select>

                <button formmethod="dialog" id="submit-dialog">Create project</button>
            </form>
        </dialog>
    </div>
    <div class="content">
        <h1>Today</h1>
        <p class="description">Today's tasks:</p>
    </div>
</body>
</html>
